{% extends "base.html" %}
{% block title %}个人资料 - PKU Date{% endblock %}

{% block content %}
<div class="form-page">
    <h2>📋 个人资料</h2>
    <p class="form-subtitle">完善资料后才能参与匹配</p>

    <form method="POST">
        <div class="form-group">
            <label>昵称</label>
            <input type="text" name="nickname" value="{{ user.nickname or '' }}"
                   placeholder="给自己取个名字" required>
        </div>

        <div class="form-group">
            <label>我的性别</label>
            <select name="gender" required>
                <option value="male" {{ 'selected' if user.gender == 'male' }}>男</option>
                <option value="female" {{ 'selected' if user.gender == 'female' }}>女</option>
            </select>
        </div>

        <div class="form-group">
            <label>我想匹配</label>
            <select name="target_gender" required>
                <option value="male" {{ 'selected' if user.target_gender == 'male' }}>男生</option>
                <option value="female" {{ 'selected' if user.target_gender == 'female' }}>女生</option>
            </select>
        </div>

        <div class="form-group">
            <label>年级</label>
            <select name="grade" required>
                <option value="大一" {{ 'selected' if user.grade == '大一' }}>大一</option>
                <option value="大二" {{ 'selected' if user.grade == '大二' }}>大二</option>
                <option value="大三" {{ 'selected' if user.grade == '大三' }}>大三</option>
                <option value="大四" {{ 'selected' if user.grade == '大四' }}>大四</option>
                <option value="研一" {{ 'selected' if user.grade == '研一' }}>研一</option>
                <option value="研二" {{ 'selected' if user.grade == '研二' }}>研二</option>
                <option value="研三" {{ 'selected' if user.grade == '研三' }}>研三</option>
                <option value="博士" {{ 'selected' if user.grade == '博士' }}>博士</option>
            </select>
        </div>

        <div class="form-group">
            <label>院系</label>
            <select name="department" required>
                <optgroup label="人文学部">
                    <option value="中国语言文学系" {{ 'selected' if user.department == '中国语言文学系' }}>中国语言文学系</option>
                    <option value="历史学系" {{ 'selected' if user.department == '历史学系' }}>历史学系</option>
                    <option value="哲学系" {{ 'selected' if user.department == '哲学系' }}>哲学系</option>
                    <option value="外国语学院" {{ 'selected' if user.department == '外国语学院' }}>外国语学院</option>
                    <option value="艺术学院" {{ 'selected' if user.department == '艺术学院' }}>艺术学院</option>
                    <option value="考古文博学院" {{ 'selected' if user.department == '考古文博学院' }}>考古文博学院</option>
                    <option value="对外汉语教育学院" {{ 'selected' if user.department == '对外汉语教育学院' }}>对外汉语教育学院</option>
                </optgroup>
                <optgroup label="社会科学学部">
                    <option value="国际关系学院" {{ 'selected' if user.department == '国际关系学院' }}>国际关系学院</option>
                    <option value="法学院" {{ 'selected' if user.department == '法学院' }}>法学院</option>
                    <option value="社会学系" {{ 'selected' if user.department == '社会学系' }}>社会学系</option>
                    <option value="政府管理学院" {{ 'selected' if user.department == '政府管理学院' }}>政府管理学院</option>
                    <option value="马克思主义学院" {{ 'selected' if user.department == '马克思主义学院' }}>马克思主义学院</option>
                    <option value="新闻与传播学院" {{ 'selected' if user.department == '新闻与传播学院' }}>新闻与传播学院</option>
                    <option value="教育学院" {{ 'selected' if user.department == '教育学院' }}>教育学院</option>
                    <option value="体育教研部" {{ 'selected' if user.department == '体育教研部' }}>体育教研部</option>
                </optgroup>
                <optgroup label="经济与管理学部">
                    <option value="经济学院" {{ 'selected' if user.department == '经济学院' }}>经济学院</option>
                    <option value="光华管理学院" {{ 'selected' if user.department == '光华管理学院' }}>光华管理学院</option>
                    <option value="国家发展研究院" {{ 'selected' if user.department == '国家发展研究院' }}>国家发展研究院</option>
                </optgroup>
                <optgroup label="理学部">
                    <option value="数学科学学院" {{ 'selected' if user.department == '数学科学学院' }}>数学科学学院</option>
                    <option value="物理学院" {{ 'selected' if user.department == '物理学院' }}>物理学院</option>
                    <option value="化学与分子工程学院" {{ 'selected' if user.department == '化学与分子工程学院' }}>化学与分子工程学院</option>
                    <option value="生命科学学院" {{ 'selected' if user.department == '生命科学学院' }}>生命科学学院</option>
                    <option value="城市与环境学院" {{ 'selected' if user.department == '城市与环境学院' }}>城市与环境学院</option>
                    <option value="地球与空间科学学院" {{ 'selected' if user.department == '地球与空间科学学院' }}>地球与空间科学学院</option>
                    <option value="心理与认知科学学院" {{ 'selected' if user.department == '心理与认知科学学院' }}>心理与认知科学学院</option>
                    <option value="建筑与景观设计学院" {{ 'selected' if user.department == '建筑与景观设计学院' }}>建筑与景观设计学院</option>
                </optgroup>
                <optgroup label="信息与工程科学部">
                    <option value="信息科学技术学院" {{ 'selected' if user.department == '信息科学技术学院' }}>信息科学技术学院</option>
                    <option value="工学院" {{ 'selected' if user.department == '工学院' }}>工学院</option>
                    <option value="计算机学院" {{ 'selected' if user.department == '计算机学院' }}>计算机学院</option>
                    <option value="电子学院" {{ 'selected' if user.department == '电子学院' }}>电子学院</option>
                    <option value="智能学院" {{ 'selected' if user.department == '智能学院' }}>智能学院</option>
                    <option value="集成电路学院" {{ 'selected' if user.department == '集成电路学院' }}>集成电路学院</option>
                    <option value="环境科学与工程学院" {{ 'selected' if user.department == '环境科学与工程学院' }}>环境科学与工程学院</option>
                    <option value="软件与微电子学院" {{ 'selected' if user.department == '软件与微电子学院' }}>软件与微电子学院</option>
                </optgroup>
                <optgroup label="医学部">
                    <option value="基础医学院" {{ 'selected' if user.department == '基础医学院' }}>基础医学院</option>
                    <option value="药学院" {{ 'selected' if user.department == '药学院' }}>药学院</option>
                    <option value="公共卫生学院" {{ 'selected' if user.department == '公共卫生学院' }}>公共卫生学院</option>
                    <option value="护理学院" {{ 'selected' if user.department == '护理学院' }}>护理学院</option>
                    <option value="医学人文学院" {{ 'selected' if user.department == '医学人文学院' }}>医学人文学院</option>
                    <option value="临床医学" {{ 'selected' if user.department == '临床医学' }}>临床医学</option>
                    <option value="口腔医学" {{ 'selected' if user.department == '口腔医学' }}>口腔医学</option>
                </optgroup>
                <optgroup label="跨学科">
                    <option value="元培学院" {{ 'selected' if user.department == '元培学院' }}>元培学院</option>
                    <option value="燕京学堂" {{ 'selected' if user.department == '燕京学堂' }}>燕京学堂</option>
                    <option value="前沿交叉学科研究院" {{ 'selected' if user.department == '前沿交叉学科研究院' }}>前沿交叉学科研究院</option>
                    <option value="其他" {{ 'selected' if user.department == '其他' }}>其他</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>自我介绍</label>
            <textarea name="bio" rows="3" placeholder="介绍一下自己吧～ 兴趣爱好、性格特点等">{{ user.bio or '' }}</textarea>
        </div>

        <div class="form-group">
            <label>微信号 <small style="color:#999;">（匹配成功后对方可见）</small></label>
            <input type="text" name="wechat" value="{{ user.wechat or '' }}" placeholder="你的微信号">
        </div>

        <button type="submit" class="btn btn-primary">保存资料</button>
    </form>

    <div style="margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #eee; text-align: center;">
        <a href="{{ url_for('delete_account') }}" style="color: #999; font-size: 0.8rem;">注销账号</a>
    </div>
</div>
{% endblock %}
